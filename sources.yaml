# 抓取配置
config:
  # 抓取间隔（分钟）
  interval: 30
  
  # 并发抓取数
  concurrency: 3
  
  # 重试次数
  retry: 3
  
  # 超时时间（秒）
  timeout: 30
  
  # User-Agent
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"